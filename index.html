<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up-form</title>
    <link rel="stylesheet" href="sign.css">
    <script src="sign.js" defer> </script>
</head>
<body>
    <div id="main">
        <div id="left">
            <img id="plant" src="photo-1585202900225-6d3ac20a6962.avif" alt="cool plant image">
            <div id="logo">
                <img id="odin" src="odin-lined.png" alt="odin logo">
                <p id="odinW">odin</p>
            </div>
            <p id="credit">Photo by <a href="https://unsplash.com/it/foto/pianta-a-foglia-verde-in-fotografia-ravvicinata-25xggax4bSA">Halie West</a> on <a href="https://unsplash.com">Unsplash</a></p>
        </div>
        <div id="welcome">
            <p id="quote">This is not a real online service! 
                You know you need something like this in your life to help you realize 
                your deepest dreams.
                <br>Sign up <i>now</i> to get started.
                <br><br> You <i>know</i> you want to.
            </p>
            <div id="form">
                <p>Let's do this!</p>
            </div>
            <div id="bottom">
                <button>Create Account</button>
                <p>Alredy have an account? Log in</p>
            </div>
        </div>
    </div>
</body>
</html>
